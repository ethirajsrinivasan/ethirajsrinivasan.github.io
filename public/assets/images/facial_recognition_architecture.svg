<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-label="Facial recognition relay system architecture">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#475569"/>
    </marker>
    <linearGradient id="piGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="flaskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
  </defs>
  <rect width="920" height="520" fill="#f8fafc" rx="12"/>
  <text x="460" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Relay activation - system architecture</text>
  <text x="460" y="58" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#64748b">relay_activation_face_recognition_system (GitHub)</text>

  <rect x="40" y="88" width="120" height="56" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="100" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#312e81">User</text>
  <text x="100" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#4338ca">Web UI upload</text>

  <rect x="200" y="72" width="300" height="280" rx="12" fill="url(#piGrad)" stroke="#334155" stroke-width="2"/>
  <text x="350" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#f8fafc">Raspberry Pi</text>

  <rect x="220" y="112" width="260" height="88" rx="8" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="136" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Django (django_front_end)</text>
  <text x="350" y="154" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#dbeafe">/ index, /add, /greet</text>
  <text x="350" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#dbeafe">MultipartEncoder HTTP client</text>
  <text x="350" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#bfdbfe">POST to localhost:5000</text>

  <rect x="220" y="212" width="125" height="64" rx="6" fill="#334155" stroke="#64748b"/>
  <text x="282" y="234" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f1f5f9">GPIO relay</text>
  <text x="282" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">relay.py</text>
  <text x="282" y="264" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">BCM pins 22-25</text>

  <rect x="355" y="212" width="125" height="64" rx="6" fill="#334155" stroke="#64748b"/>
  <text x="417" y="234" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f1f5f9">I2C LCD</text>
  <text x="417" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">Lcd.py (optional)</text>

  <rect x="220" y="288" width="260" height="48" rx="6" fill="#334155" stroke="#64748b"/>
  <text x="350" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f1f5f9">Pi camera / image file</text>
  <text x="350" y="326" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94a3b8">static/images/*.jpg</text>

  <rect x="540" y="112" width="200" height="120" rx="8" fill="url(#flaskGrad)" stroke="#14b8a6" stroke-width="2"/>
  <text x="640" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Flask (face_web_app)</text>
  <text x="640" y="156" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#ccfbf1">:5000 on 0.0.0.0</text>
  <text x="640" y="174" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#99f6e4">POST /add enroll</text>
  <text x="640" y="188" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#99f6e4">POST /recognize match</text>
  <text x="640" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#5eead4">face_recognition (dlib)</text>
  <text x="640" y="224" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#5eead4">compare_faces tolerance 0.5</text>

  <rect x="540" y="268" width="200" height="72" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="2"/>
  <text x="640" y="294" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#ffffff">PostgreSQL</text>
  <text x="640" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#bfdbfe">face_encodings table</text>
  <text x="640" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#93c5fd">file_name + encoding[]</text>

  <line x1="160" y1="116" x2="198" y2="116" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="150" x2="538" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="508" y="142" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569">localhost:5000</text>
  <line x1="640" y1="232" x2="640" y2="266" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="40" y="380" width="840" height="120" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="60" y="404" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Flows (views.py and app.py)</text>
  <text x="60" y="428" font-family="system-ui,sans-serif" font-size="11" fill="#334155">Enroll: User - Django /add - POST /add - encode face - PostgreSQL</text>
  <text x="60" y="450" font-family="system-ui,sans-serif" font-size="11" fill="#334155">Recognize: User - Django /greet - POST /recognize - name or unknown</text>
  <text x="60" y="472" font-family="system-ui,sans-serif" font-size="11" fill="#334155">Relay: relay.py switches GPIO when authorized user is recognized</text>
  <text x="60" y="490" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Unknown face keeps relay OFF</text>
</svg>
